name: expense_tracker
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1       # State management
  get_it: ^8.0.2                 # Service locator
  go_router: ^14.7.1             # Navigation
  hive_ce: ^2.2.4                # Database (Community Edition)
  hive_ce_flutter: ^1.1.2        # Hive CE Flutter
  google_generative_ai: ^0.4.6   # Gemini SDK
  flutter_dotenv: ^5.2.1         # .env loader
  image_picker: ^1.1.2           # Pick receipt images
  fl_chart: ^0.70.2              # Data visualization
  syncfusion_flutter_charts: ^34.1.31 # Syncfusion data visualization
  flutter_markdown: ^0.7.3       # Markdown parsing package
  lottie: ^3.1.2                 # Lottie animation support
  intl: ^0.20.1                  # Formatting dates/currency
  uuid: ^4.5.1                   # Unique IDs
  flutter_screenutil: ^5.9.3     # Responsive sizing and text scaling

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.11.1      # Hive CE adapter generator
  build_runner: ^2.4.13          # Code generator runner


flutter:
  uses-material-design: true

  assets:
    - .env

